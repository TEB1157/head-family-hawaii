<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Head Family Hawaii Trip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="brand">
                <h1 class="brand-title">Head Family Hawaii Trip</h1>
                <p class="brand-sub">5 Weeks in Aina Haina &middot; March&ndash;April 2026</p>
            </div>
            <div class="search-wrap">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="search" id="search" class="search-input" placeholder="Search activities, places, food...">
            </div>
        </div>
        <nav class="filters" id="filters"></nav>
    </header>

    <main class="main">
        <div class="stats" id="stats"></div>
        <div class="grid" id="grid"></div>
        <div class="empty-state" id="empty" style="display:none">
            <p>No activities match your search.</p>
        </div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal" role="dialog">
            <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
            <div class="modal-gallery" id="modal-gallery"></div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <footer class="footer">
        <p>Base: 5611 Kalanianaole Hwy, Aina Haina, HI 96821</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js?v=3"></script>
</body>
</html>
